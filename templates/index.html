<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkinAI Analyzer</title>
<style>
    body {
        font-family: Arial;
        background: #f4f4f4;
        text-align: center;
        padding: 20px;
    }
    .container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        max-width: 600px;
        margin: auto;
    }
    img {
        max-width: 100%;
        margin-top: 10px;
        border-radius: 10px;
    }
    button {
        padding: 10px 20px;
        margin-top: 15px;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🧴 SkinAI Analyzer</h1>
    <p>Upload selfie for skin analysis</p>

    <input type="file" id="upload" accept="image/*">
    <br>
    <img id="preview">

    <br>
    <button onclick="analyzeSkin()">🚀 Analyze Skin</button>

    <h2 id="result"></h2>
    <div id="routine"></div>
    <div id="tips"></div>
</div>

<script>
const SKIN_TYPES = {
    0: {
        name: "🛢️ Oily",
        routine: ["Salicylic Acid cleanser", "Niacinamide serum", "Matte moisturizer"],
        tips: ["SPF 50 daily", "Oil control sheets"]
    },
    1: {
        name: "🌵 Dry",
        routine: ["Ceramide cleanser", "Hyaluronic Acid serum", "Rich cream"],
        tips: ["Humidifier use", "Omega-3 diet"]
    },
    2: {
        name: "⚖️ Combination",
        routine: ["Gentle foaming cleanser", "Lightweight serum", "Gel moisturizer"],
        tips: ["T-zone focus", "Layering technique"]
    },
    3: {
        name: "😰 Sensitive",
        routine: ["Fragrance-free cleanser", "Centella serum", "Barrier cream"],
        tips: ["Patch test", "Minimal routine"]
    }
};

let imageElement = document.getElementById("preview");

document.getElementById("upload").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        imageElement.src = URL.createObjectURL(file);
    }
});

function analyzeSkin() {
    if (!imageElement.src) {
        alert("Please upload image first");
        return;
    }

    // Fake analysis (random result like your Python logic demo)
    let skin_id = Math.floor(Math.random() * 4);
    let data = SKIN_TYPES[skin_id];

    document.getElementById("result").innerText = "Your Skin Type: " + data.name;

    let routineHTML = "<h3>Routine</h3>";
    data.routine.forEach(r => {
        routineHTML += "• " + r + "<br>";
    });

    let tipsHTML = "<h3>Tips</h3>";
    data.tips.forEach(t => {
        tipsHTML += "⭐ " + t + "<br>";
    });

    document.getElementById("routine").innerHTML = routineHTML;
    document.getElementById("tips").innerHTML = tipsHTML;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>SkinAI Pro</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#89f7fe,#66a6ff);
    text-align: center;
}

.container {
    background: white;
    padding: 25px;
    margin: 50px auto;
    width: 320px;
    border-radius: 15px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

button {
    padding: 10px 20px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}

.result-box {
    margin-top: 15px;
    padding: 12px;
    background: #f0f0f0;
    border-radius: 10px;
}

#result {
    font-weight: bold;
    color: #333;
}

#remedy {
    margin-top: 8px;
    color: #555;
}
</style>

</head>

<body>

<div class="container">
<h1>🧴 SkinAI Pro</h1>

<input type="file" id="file" accept="image/*">
<img id="preview">

<br><br>
<button onclick="analyze()">Analyze</button>

<div class="result-box">
    <h3 id="result"></h3>
    <p id="remedy"></p>
</div>

</div>

<script>

// preview image
document.getElementById("file").addEventListener("change", function(e){
    let file = e.target.files[0];
    if(file){
        document.getElementById("preview").src = URL.createObjectURL(file);
    }
});

// main analyze function
async function analyze() {

    let file = document.getElementById("file").files[0];

    if(!file){
        alert("Upload image first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    try{
        let res = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if(data.error){
            alert(data.error);
            return;
        }

        // show result
        let resultText = "🧴 Skin Type: " + data.skin_type + " (" + data.confidence + ")";
        document.getElementById("result").innerText = resultText;

        // remedies
        let remedy = "";

        if(data.skin_type.includes("Oily")){
            remedy = "🧴 Neem paste, aloe vera, wash face twice daily.";
        } 
        else if(data.skin_type.includes("Dry")){
            remedy = "💧 Honey, coconut oil, drink water.";
        } 
        else if(data.skin_type.includes("Sensitive")){
            remedy = "🌿 Aloe vera, avoid harsh chemicals.";
        } 
        else {
            remedy = "⚖️ Maintain proper skincare routine.";
        }

        document.getElementById("remedy").innerText = remedy;

    }catch(err){
        alert("Server error");
        console.log(err);
    }
}
</script>

</body>
</html>
